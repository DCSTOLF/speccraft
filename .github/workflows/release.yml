name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    # All targets are pure-Go, CGO_ENABLED=0 cross-compiles (GOOS/GOARCH set
    # explicitly below), so the host runner is irrelevant to the output. Build
    # everything on ubuntu-latest: no macOS-runner queue/capacity dependency
    # (macos-13 Intel is constrained/retiring), faster, and far cheaper on a
    # private repo (macOS minutes bill at 10x). This also sidesteps runner-only
    # portability traps like macOS lacking `sha256sum`.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: macos
            arch: amd64
          - os: macos
            arch: arm64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache-dependency-path: tools/go.sum

      - name: Build binaries
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.os == 'macos' && 'darwin' || matrix.os }}
          GOARCH: ${{ matrix.arch }}
        working-directory: tools
        run: |
          mkdir -p dist
          for cmd in speccraft-state speccraft-guard speccraft-drift; do
            go build -o dist/$cmd ./cmd/$cmd
          done

      - name: Create tarball
        env:
          VERSION: ${{ github.ref_name }}
          PLATFORM: ${{ matrix.os }}-${{ matrix.arch }}
        run: |
          cd tools/dist
          TARBALL="speccraft-${VERSION#v}-${PLATFORM}.tar.gz"
          tar -czf "$TARBALL" speccraft-state speccraft-guard speccraft-drift
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: speccraft-${{ matrix.os }}-${{ matrix.arch }}
          path: tools/dist/*.tar.gz

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: Generate checksums
        # Recompute over all downloaded tarballs so checksums.txt carries a
        # complete, correctly-named entry for every platform (the per-arch
        # artifacts collide under merge-multiple). Bare filenames match what
        # install-binaries.sh and verify-release.sh expect.
        run: cd dist && sha256sum *.tar.gz > checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
          name: speccraft ${{ github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

      - name: Verify published release
        # Primary release-completeness guard (spec 0021, AC4): fail the
        # release loudly if any platform tarball or checksums.txt is missing
        # or its SHA-256 does not match. Keyed to the just-pushed tag, so it
        # can only run for an existing tag — never a bare plugin.json bump
        # (deadlock-free). Cheap-hermetic: no ANTHROPIC_API_KEY.
        env:
          TAG: ${{ github.ref_name }}
        run: bash scripts/verify-release.sh "${TAG#v}"
