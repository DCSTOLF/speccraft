name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'images/**'
      - 'specs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'images/**'
      - 'specs/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-linux:
    name: Go unit tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache-dependency-path: tools/go.sum
      - name: Run tests
        working-directory: tools
        run: go test ./...

  unit-macos:
    name: Go unit tests (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache-dependency-path: tools/go.sum
      - name: Run tests
        working-directory: tools
        run: go test ./...

  hooks:
    name: Hook tests (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install bats
        run: sudo apt-get install -y bats
      - name: Run hook tests
        run: |
          if [ -d tests/hooks ] && ls tests/hooks/*.bats 2>/dev/null; then
            bats tests/hooks/
          else
            echo "No bats tests yet (added per phase)"
          fi

  e2e-devcontainer:
    name: E2E (devcontainer)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Run e2e tests
        run: |
          devcontainer up --workspace-folder .
          devcontainer exec --workspace-folder . bash tests/e2e/run.sh
