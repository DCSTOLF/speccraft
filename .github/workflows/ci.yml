name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'INSTALL.md'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - 'KICKOFF.md'
      - 'LICENSE'
      - 'speccraft-technical-review.md'
      - 'speccraft-v1-spec.md'
      - 'images/**'
      - 'specs/**'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'README.md'
      - 'INSTALL.md'
      - 'CONTRIBUTING.md'
      - 'docs/**'
      - 'KICKOFF.md'
      - 'LICENSE'
      - 'speccraft-technical-review.md'
      - 'speccraft-v1-spec.md'
      - 'images/**'
      - 'specs/**'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  unit-linux:
    name: Go unit tests (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache-dependency-path: tools/go.sum
      - name: Run tests
        working-directory: tools
        run: go test ./...

  unit-macos:
    name: Go unit tests (macOS)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache-dependency-path: tools/go.sum
      - name: Run tests
        working-directory: tools
        run: go test ./...

  hooks:
    name: Hook tests (bats)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.3"
          cache-dependency-path: tools/go.sum
      - name: Install bats
        run: sudo apt-get install -y bats
      # spec 0012's pre-tool-use-state-guard.bats invokes the
      # hook script, which calls `speccraft-state find-root` and
      # delegates to `speccraft-guard`. Without these binaries on
      # PATH, the hook silently no-ops (exits 0) and the reject
      # cases fail spuriously. Build them into the repo's bin/ so
      # the bats setup's `export PATH="$PLUGIN_DIR/bin:$PATH"`
      # picks them up.
      - name: Build helper binaries
        working-directory: tools
        run: |
          go build -o ../bin/speccraft-state ./cmd/speccraft-state
          go build -o ../bin/speccraft-guard ./cmd/speccraft-guard
      - name: Run hook tests
        run: |
          if [ -d tests/hooks ] && ls tests/hooks/*.bats 2>/dev/null; then
            bats tests/hooks/
          else
            echo "No bats tests yet (added per phase)"
          fi

  e2e-devcontainer:
    name: E2E (devcontainer)
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Run e2e tests
        run: |
          devcontainer up --workspace-folder .
          devcontainer exec --workspace-folder . \
            --remote-env CLAUDE_CODE_OAUTH_TOKEN="$CLAUDE_CODE_OAUTH_TOKEN" \
            bash tests/e2e/run.sh

  e2e-language-only:
    # Spec 0008 AC #3 + AC #4: fast-signal language-dispatch e2e that
    # never invokes claude -p. Runs on every push AND pull_request (NOT
    # gated to push-to-main like e2e-devcontainer). Does NOT pass
    # ANTHROPIC_API_KEY; the --language-only flag on run.sh short-
    # circuits the claude lifecycle and only runs the per-language
    # fixture scripts.
    name: E2E language-only (devcontainer, no API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install devcontainer CLI
        run: npm install -g @devcontainers/cli
      - name: Run language-only e2e fixtures
        run: |
          devcontainer up --workspace-folder .
          devcontainer exec --workspace-folder . \
            bash tests/e2e/run.sh --language-only

  auto-tag:
    # Spec 0021 (AC5): when a merged commit bumps the plugin version and
    # that version has no matching tag yet, create + push vX.Y.Z so
    # release.yml builds and publishes the release. Cheap-hermetic: no
    # ANTHROPIC_API_KEY; the decision logic is unit-pinned by
    # tests/e2e/auto_tag_version_diff_test.sh.
    #
    # The tag MUST be pushed with RELEASE_TAG_PAT (a PAT/deploy key), NOT
    # the default GITHUB_TOKEN: GitHub suppresses `on: push` re-triggers
    # for events caused by the built-in token, which would leave
    # release.yml silently never firing.
    name: Auto-tag on version bump
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # Use the PAT as the persisted credential so the tag push below
          # authenticates as the PAT's user (re-triggering release.yml), not
          # github-actions[bot]. A `git remote set-url` with inline creds does
          # NOT work: checkout's persisted http.extraheader (GITHUB_TOKEN) takes
          # precedence over inline URL userinfo, so the bot identity wins — which
          # is read-only on a private repo (403) and never triggers workflows.
          token: ${{ secrets.RELEASE_TAG_PAT }}
      - name: Create release tag if plugin.json version is untagged
        run: |
          git fetch --tags --quiet
          if tag="$(bash scripts/auto-tag.sh should_tag)"; then
            echo "Creating release tag: $tag"
            git config user.name "speccraft-bot"
            git config user.email "speccraft-bot@users.noreply.github.com"
            git tag -a "$tag" -m "Release $tag"
            git push origin "$tag"
          else
            echo "plugin.json version is already tagged; nothing to do."
          fi
